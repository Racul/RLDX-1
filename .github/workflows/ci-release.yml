name: CI

# Lint-only CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    if: github.repository == 'RLWRLD/RLDX-1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install ruff
        run: uv tool install ruff

      - name: Ruff check (rldx/)
        run: uv tool run ruff check rldx/

      - name: Ruff format --check (rldx/)
        run: uv tool run ruff format --check rldx/
